<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>政府補助方案展示</title>
<link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Baloo+2:wght@600&display=swap" rel="stylesheet"/>

<style>
  :root{
    --controls-safe: 110px;
    --title-safe: 140px;
  }

  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    overflow: hidden; background: #000;
  }

  .bg-wrap { position: fixed; inset: 0; z-index: 0; }
  .bg {
    position: absolute; inset: 0;
    background: url('https://github.com/Sethjesus/Photo/blob/main/EDM10.jpg?raw=true') center/cover no-repeat;
    filter: brightness(1) saturate(1.1);
  }

  .container-fluid { position: relative; z-index: 1; width: 100vw; height: 100dvh; overflow: hidden; }

  .pages { display: flex; height: 170%; transition: transform 0.8s ease-in-out; width: calc(var(--count, 1) * 100vw); }

  .page {
    min-width: 100vw; height: 180%;
    display: flex; flex-direction: column;
    justify-content: flex-start; align-items: center;
    user-select: none;
    padding-top: 1vh;  /* ↓ 標題區稍往下 */
  }

  .page-text {
    font-family: 'ZCOOL KuaiLe','Baloo 2',cursive,'Microsoft JhengHei',sans-serif;
    font-size: clamp(20px, 2.8vw, 36px);
    letter-spacing: 2px; color: #fff8d6;
    text-shadow: 2px 2px 8px rgba(0,0,0,.8);
    position: relative; z-index: 3;
    margin-bottom: 15px;
    padding: 10px 22px; border-radius: 12px;
    background: rgba(0,0,0,0.55);
  }

  .page img{
    width: 100%;  /* 放大圖片 */
    max-height: calc(115dvh - var(--controls-safe) - var(--title-safe) + 0px);
    object-fit: contain;
    transition: transform .3s ease;
    cursor: pointer;
    margin-top: 0;   /* 微調置中 */
  }
  .page img:hover { transform: scale(1.04); }

  @media (max-width: 968px){
    .page { padding-top: 10vh; }
    .page img{
      width: 100%;
      max-height: calc(320dvh - var(--controls-safe) - 130px);
    }
  }

  .pagination-dots{
    position: fixed; bottom: calc(var(--controls-safe) - 35px); left: 50%; transform: translateX(-50%);
    display: flex; gap: 8px; z-index: 2;
  }
  .dot{ width: 12px; height: 12px; background: #bbb; border-radius: 50%; transition: background .3s, transform .2s; }
  .dot.active{ background: #ffd54f; transform: scale(1.3); }

  .controls{
    position: fixed; bottom: 12px; left: 0; right: 0; text-align: center; z-index: 2;
  }
  .controls button, .home-btn{
    padding: 8px 15px; font-size: 14px; border: none; border-radius: 5px;
    color: #fff; cursor: pointer; margin: 5px; box-shadow: 2px 2px 5px rgba(0,0,0,.2);
    transition: background-color .3s, transform .2s;
  }
  .controls button{ background: #007BFF; }
  .home-btn{ background: #28a745; text-decoration: none; display: inline-block; }
  .home-btn:hover{ background: #218838; transform: scale(1.05); }

  .fader{ position: fixed; inset: 0; z-index: 3; background: #000; pointer-events: none; opacity: 0; transition: opacity .4s ease; }
  .fader.show{ opacity: .25; }

  .touch-hotzone { position: fixed; top: 0; bottom: 0; width: 20vw; z-index: 3; }
  .touch-hotzone.left { left: 0; }
  .touch-hotzone.right{ right: 0; }

  :fullscreen .controls,
  :fullscreen .pagination-dots { opacity: 0; pointer-events: none; }
  :fullscreen .page img { width: 95%; max-height: 95%; margin-top: 0; transform: none; }
</style>
</head>
<body>

<div class="bg-wrap"><div class="bg"></div></div>

<div class="container-fluid">
  <div class="pages" id="slider">
    <div class="page"><div class="page-text">🌸 校園能耗管理 🌸</div><img src="https://github.com/Sethjesus/Photo/blob/main/EDM1.jpg?raw=true"></div>
    <div class="page"><div class="page-text">🍃 校園碳盤查 🍃</div><img src="https://github.com/Sethjesus/Photo/blob/main/EDM2.jpg?raw=true"></div>
    <div class="page"><div class="page-text">✨ 半導體製造業 ✨</div><img src="https://github.com/Sethjesus/Photo/blob/main/EDM3.jpg?raw=true"></div>
    <div class="page"><div class="page-text">💧 淨零低碳化服務 💧</div><img src="https://github.com/Sethjesus/Photo/blob/main/EDM4.jpg?raw=true"></div>
    <div class="page"><div class="page-text">☀️ 陽光空氣水方案 ☁️</div><img src="https://github.com/Sethjesus/Photo/blob/main/EDM5.jpg?raw=true"></div>
    <div class="page"><div class="page-text">⚡ ISO50001智慧能源 ⚡</div><img src="https://github.com/Sethjesus/Photo/blob/main/EDM6.jpg?raw=true"></div>
    <div class="page"><div class="page-text">🏯 宮廟16+4碳盤查補助 🏯</div><img src="https://github.com/Sethjesus/Photo/blob/main/EDM7.jpg?raw=true"></div>
    <div class="page"><div class="page-text">🌿 低碳旅遊 🌿</div><img src="https://github.com/Sethjesus/Photo/blob/main/EDM8.jpg?raw=true"></div>
    <div class="page"><div class="page-text">🌏 ISO-14067碳足跡認證 🌏</div><img src="https://github.com/Sethjesus/Photo/blob/main/EDM9.jpg?raw=true"></div>
    <div class="page"><div class="page-text">🏬 量販百貨智慧能源管理方案 🏬</div><img src="https://github.com/Sethjesus/Photo/blob/main/EDM19.jpg?raw=true"></div>
  </div>
</div>

<div class="pagination-dots" id="dots"></div>
<div class="controls">
  <button id="prev">上一頁</button>
  <button id="next">下一頁</button>
  <button id="stop">停止</button>
  <a href="https://jpesg.netlify.app/" class="home-btn">回景煬首頁</a>
</div>

<div class="touch-hotzone left" id="hotLeft"></div>
<div class="touch-hotzone right" id="hotRight"></div>
<div class="fader" id="fader"></div>

<script>
let currentIndex = 0;
const slider = document.getElementById('slider');
const pages  = document.querySelectorAll('.page');
const totalPages = pages.length;
slider.style.setProperty('--count', totalPages);

const dotsWrap = document.getElementById('dots');
for (let i=0;i<totalPages;i++){
  const dot = document.createElement('div');
  dot.className = 'dot' + (i===0?' active':'');
  dot.addEventListener('click', () => animateSlideChange(()=>{ currentIndex=i; updateSlider(); }));
  dotsWrap.appendChild(dot);
}
const dots = document.querySelectorAll('.dot');

function updateSlider(){
  slider.style.transform = `translateX(-${currentIndex*100}vw)`;
  dots.forEach((d,i)=>d.classList.toggle('active', i===currentIndex));
}

const fader = document.getElementById('fader');
async function animateSlideChange(doChange){
  fader.classList.add('show');
  await new Promise(r=>setTimeout(r,120));
  doChange();
  await new Promise(r=>setTimeout(r,250));
  fader.classList.remove('show');
}

function nextPage(){ currentIndex = (currentIndex+1)%totalPages; updateSlider(); }
function prevPage(){ currentIndex = (currentIndex-1+totalPages)%totalPages; updateSlider(); }

document.getElementById('next').onclick = () => animateSlideChange(nextPage);
document.getElementById('prev').onclick = () => animateSlideChange(prevPage);
let autoSlide = setInterval(()=>animateSlideChange(nextPage), 6000);
document.getElementById('stop').onclick = () => clearInterval(autoSlide);

/* 點擊圖片全螢幕 */
document.querySelectorAll('.page img').forEach(img=>{
  img.addEventListener('click', ()=>{ img.requestFullscreen(); });
});

/* 手機滑動切頁 */
let startX=0,startY=0,dx=0,dy=0,isSwiping=false;
slider.addEventListener('touchstart',e=>{
  const t=e.touches[0]; startX=t.clientX; startY=t.clientY;
  dx=dy=0; isSwiping=false;
},{passive:true});
slider.addEventListener('touchmove',e=>{
  const t=e.touches[0]; dx=t.clientX-startX; dy=t.clientY-startY;
  if(!isSwiping && Math.abs(dx)>10 && Math.abs(dy)/Math.abs(dx)<0.6){
    isSwiping=true; e.preventDefault();
  }
},{passive:false});
slider.addEventListener('touchend',()=>{
  if(isSwiping && Math.abs(dx)>50){ dx<0?animateSlideChange(nextPage):animateSlideChange(prevPage); }
  startX=startY=dx=dy=0; isSwiping=false;
});
document.getElementById('hotLeft').addEventListener('touchend',()=>animateSlideChange(prevPage),{passive:true});
document.getElementById('hotRight').addEventListener('touchend',()=>animateSlideChange(nextPage),{passive:true});
</script>
</body>
</html>
