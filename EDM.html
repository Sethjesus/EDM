<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
  <title>補助方案 · 環景展示（按鈕最佳化）</title>
  <!-- Bootstrap 4 僅保留極簡按鈕相容 -->
  <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet" />
  <!-- 活潑字體 -->
  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Baloo+2:wght@600&display=swap" rel="stylesheet" />
  <style>
    /* ----- 全域重置 & 變數 ----- */
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    :root {
      --control-safe: 100px;
      --title-safe: 70px;
      --dot-active: #ffc107;
      --transition-main: 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0a0f1e;
      font-family: 'Baloo 2', 'Microsoft JhengHei', sans-serif;
    }

    /* 背景原圖 */
    .bg-wrap { position: fixed; inset: 0; z-index: 0; }
    .bg {
      position: absolute; inset: 0;
      background: url('https://pub-531c96b02ed745e0bbfd0e96bfde8518.r2.dev/EDM10.jpg') center/cover no-repeat;
      filter: brightness(0.9) saturate(1.2) contrast(1.1);
      transform: scale(1.02);
    }

    /* 主容器 – 全屏手勢區域 */
    .container-fluid {
      position: relative;
      z-index: 2;
      width: 100vw;
      height: 100dvh;
      overflow: hidden;
      padding: 0 !important;
    }

    /* 滑動軌道 */
    .pages {
      display: flex;
      height: 100%;
      transition: transform var(--transition-main);
      will-change: transform;
      cursor: grab;
    }
    .pages:active { cursor: grabbing; }

    /* 每一頁 – 垂直置中但預留底部空間給固定控制列 (避免圖片被按鈕擋住) */
    .page {
      min-width: 100vw;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;        /* 主軸置中 */
      align-items: center;
      padding: 1rem 1rem 100px 1rem;  /* 下padding 100px 完全避開底部固定控制區 (控制列高度約80~90px) */
      user-select: none;
    }

    /* 標題方塊 – 毛玻璃 */
    .page-text {
      font-family: 'ZCOOL KuaiLe', 'Baloo 2', cursive, 'Microsoft JhengHei', sans-serif;
      font-size: clamp(20px, 5vw, 36px);
      font-weight: 600;
      letter-spacing: 1.5px;
      color: #fff8e7;
      text-shadow: 3px 3px 10px rgba(0,0,0,0.7), 0 0 15px rgba(0,30,30,0.5);
      background: rgba(10, 20, 30, 0.65);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,215,100,0.3);
      padding: 10px 30px;
      border-radius: 60px;
      margin-bottom: 20px;
      box-shadow: 0 10px 25px -8px rgba(0,0,0,0.5);
      white-space: nowrap;
    }
    @media (max-width: 480px) {
      .page-text {
        font-size: 18px;
        padding: 8px 18px;
        white-space: normal;
        text-align: center;
        line-height: 1.3;
      }
    }

    /* 圖片 – 最大高度設定保留給 padding-bottom 空間 */
    .page img {
      width: auto;
      max-width: 95%;
      max-height: calc(70vh - 30px);   /* 保留空間給下方控制區，不會被擋 */
      height: auto;
      object-fit: contain;
      border-radius: 24px;
      box-shadow: 0 20px 35px -8px rgba(0,0,0,0.7), 0 0 0 2px rgba(255,200,50,0.15);
      transition: transform 0.25s ease, box-shadow 0.3s;
      cursor: pointer;
      background: rgba(0,0,0,0.1);
      pointer-events: auto;
    }
    .page img:hover {
      transform: scale(1.02);
      box-shadow: 0 25px 40px -5px #000000cc, 0 0 0 3px #ffd96677;
    }

    /* 分頁點 – 提高至控制列上方，且不被控制列遮蔽 (位於控制列之上) */
    .pagination-dots {
      position: fixed;
      bottom: 95px;                   /* 控制列高度約80px，讓dots剛好在其上方 */
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 14px;
      z-index: 30;                    /* 高於控制列 (z-index 20) */
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 10px 20px;
      border-radius: 40px;
      border: 1px solid rgba(255,255,200,0.25);
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    .dot {
      width: 14px;
      height: 14px;
      background: rgba(230, 240, 255, 0.6);
      border-radius: 50%;
      transition: all 0.3s;
      cursor: pointer;
      box-shadow: 0 2px 6px black;
    }
    .dot.active {
      background: var(--dot-active);
      transform: scale(1.7);
      box-shadow: 0 0 15px #ffb347;
    }

    /* 底部控制列 – 固定於最底層，提高z-index但低於分頁點 */
    .controls {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      z-index: 20;                    /* 比dots低，確保dots可見 */
      background: rgba(5, 15, 25, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255,215,0,0.25);
      box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
    }

    .controls button, .home-btn {
      padding: 10px 22px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 40px;
      color: white;
      background: #1e2b3c;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3), 0 0 0 1px #3f5568 inset;
      cursor: pointer;
      transition: all 0.2s;
      min-width: 90px;
      letter-spacing: 0.5px;
      backdrop-filter: blur(4px);
      text-decoration: none;
      text-align: center;
      line-height: 1.2;
    }
    .controls button:hover, .home-btn:hover {
      background: #2d4055;
      transform: translateY(-2px);
      box-shadow: 0 10px 16px -6px black, 0 0 0 2px #f9c35c inset;
      color: #fff9e6;
    }
    .home-btn {
      background: #2b4f3b;
    }
    .home-btn:hover {
      background: #3b6b4f;
    }
    #stop {
      background: #4a3b3b;
    }
    #stop:hover {
      background: #6b4b4b;
    }

    /* 左右熱區 – 高度避開控制列 */
    .touch-hotzone {
      position: fixed;
      top: 0;
      bottom: 95px;                /* 止於分頁點上方，完全避開控制列 */
      width: 18vw;
      z-index: 15;
      background: transparent;
    }
    .touch-hotzone.left { left: 0; }
    .touch-hotzone.right { right: 0; }

    /* 過場淡入層 */
    .fader {
      position: fixed;
      inset: 0;
      z-index: 40;
      background: #0b1420;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .fader.show { opacity: 0.3; }

    /* 全螢幕時隱藏底部元件 */
    :fullscreen .controls,
    :fullscreen .pagination-dots,
    :-webkit-full-screen .controls,
    :-webkit-full-screen .pagination-dots {
      opacity: 0;
      pointer-events: none;
    }
    :fullscreen .page img,
    :-webkit-full-screen .page img {
      max-height: 90vh;
    }

    /* 平板/電腦微調 */
    @media (min-width: 1024px) {
      .page img { max-height: 65vh; }
      .page-text { margin-bottom: 30px; font-size: 40px; }
      .controls { padding: 15px 25px; gap: 20px; }
      .controls button, .home-btn { padding: 12px 32px; font-size: 18px; }
      .pagination-dots { bottom: 105px; }
    }

    /* 極小裝置 (高度小於650px) 額外調整，確保按鈕不被自身擋住 */
    @media (max-height: 650px) {
      .page { padding-bottom: 110px; }
      .page img { max-height: 55vh; }
      .controls button, .home-btn { padding: 6px 16px; font-size: 14px; min-width: 70px; }
    }
  </style>
</head>
<body>
  <div class="bg-wrap"><div class="bg"></div></div>

  <div class="container-fluid">
    <div class="pages" id="slider">
      <div class="page"><div class="page-text">🌸 校園能耗管理 🌸</div><img src="https://pub-531c96b02ed745e0bbfd0e96bfde8518.r2.dev/EDM1.jpg" alt="校園能耗" loading="lazy"></div>
      <div class="page"><div class="page-text">🍃 校園碳盤查 🍃</div><img src="https://pub-531c96b02ed745e0bbfd0e96bfde8518.r2.dev/EDM2.jpg" alt="碳盤查" loading="lazy"></div>
      <div class="page"><div class="page-text">✨ 半導體製造業 ✨</div><img src="https://pub-531c96b02ed745e0bbfd0e96bfde8518.r2.dev/EDM3.jpg" alt="半導體" loading="lazy"></div>
      <div class="page"><div class="page-text">💧 淨零低碳化服務 💧</div><img src="https://pub-531c96b02ed745e0bbfd0e96bfde8518.r2.dev/EDM4.jpg" alt="低碳服務" loading="lazy"></div>
      <div class="page"><div class="page-text">☀️ 陽光空氣水方案 ☁️</div><img src="https://pub-531c96b02ed745e0bbfd0e96bfde8518.r2.dev/EDM5.jpg" alt="陽光空氣水" loading="lazy"></div>
      <div class="page"><div class="page-text">⚡ ISO50001智慧能源 ⚡</div><img src="https://pub-531c96b02ed745e0bbfd0e96bfde8518.r2.dev/EDM6.jpg" alt="智慧能源" loading="lazy"></div>
      <div class="page"><div class="page-text">🏯 宮廟16+4碳盤查補助 🏯</div><img src="https://pub-531c96b02ed745e0bbfd0e96bfde8518.r2.dev/EDM7.jpg" alt="宮廟碳盤查" loading="lazy"></div>
      <div class="page"><div class="page-text">🌿 低碳旅遊 🌿</div><img src="https://pub-531c96b02ed745e0bbfd0e96bfde8518.r2.dev/EDM8.jpg" alt="低碳旅遊" loading="lazy"></div>
      <div class="page"><div class="page-text">🌏 ISO-14067碳足跡認證 🌏</div><img src="https://pub-531c96b02ed745e0bbfd0e96bfde8518.r2.dev/EDM9.jpg" alt="碳足跡" loading="lazy"></div>
      <div class="page"><div class="page-text">🏬 量販百貨智慧能源管理方案 🏬</div><img src="https://pub-531c96b02ed745e0bbfd0e96bfde8518.r2.dev/EDM19.jpg" alt="百貨能源" loading="lazy"></div>
    </div>
  </div>

  <!-- 分頁指示器 (提高位置，位於控制列上方) -->
  <div class="pagination-dots" id="dots"></div>

  <!-- 底部控制區 (固定在最底部，且可點範圍明確) -->
  <div class="controls">
    <button id="prev" aria-label="上一頁">◀ 上一頁</button>
    <button id="next" aria-label="下一頁">下一頁 ▶</button>
    <button id="stop" aria-label="暫停自動輪播">⏸️ 停止</button>
    <a href="https://jpesg.netlify.app/" class="home-btn" aria-label="回首頁">🏠 回景煬首頁</a>
  </div>

  <!-- 左右熱區 (避開控制列) -->
  <div class="touch-hotzone left" id="hotLeft"></div>
  <div class="touch-hotzone right" id="hotRight"></div>

  <div class="fader" id="fader"></div>

  <script>
    (function(){
      const slider = document.getElementById('slider');
      const pages = document.querySelectorAll('.page');
      const totalPages = pages.length;
      let currentIndex = 0;
      let autoSlideInterval = null;
      const AUTO_INTERVAL = 5500;

      // 建立分頁點
      const dotsWrap = document.getElementById('dots');
      dotsWrap.innerHTML = '';
      for (let i = 0; i < totalPages; i++) {
        const dot = document.createElement('div');
        dot.className = 'dot' + (i === 0 ? ' active' : '');
        dot.setAttribute('data-index', i);
        dot.addEventListener('click', (e) => {
          const idx = parseInt(e.target.getAttribute('data-index'), 10);
          if (!isNaN(idx) && idx !== currentIndex) {
            animateSlideChange(() => { currentIndex = idx; updateSlider(); });
          }
        });
        dotsWrap.appendChild(dot);
      }
      const dots = document.querySelectorAll('.dot');

      function updateSlider() {
        slider.style.transform = `translateX(-${currentIndex * 100}vw)`;
        dots.forEach((dot, i) => dot.classList.toggle('active', i === currentIndex));
      }

      const fader = document.getElementById('fader');
      function animateSlideChange(changeFn) {
        fader.classList.add('show');
        setTimeout(() => {
          changeFn();
          setTimeout(() => fader.classList.remove('show'), 200);
        }, 100);
      }

      function nextPage() { currentIndex = (currentIndex + 1) % totalPages; updateSlider(); }
      function prevPage() { currentIndex = (currentIndex - 1 + totalPages) % totalPages; updateSlider(); }

      function startAutoPlay() {
        if (autoSlideInterval) clearInterval(autoSlideInterval);
        autoSlideInterval = setInterval(() => animateSlideChange(nextPage), AUTO_INTERVAL);
      }
      function stopAutoPlay() {
        if (autoSlideInterval) {
          clearInterval(autoSlideInterval);
          autoSlideInterval = null;
        }
      }

      // 初始化自動播放
      startAutoPlay();

      // 按鈕事件 (直接綁定，確保不被擋)
      const prevBtn = document.getElementById('prev');
      const nextBtn = document.getElementById('next');
      const stopBtn = document.getElementById('stop');
      const hotLeft = document.getElementById('hotLeft');
      const hotRight = document.getElementById('hotRight');

      // 移除所有可能重複監聽，重新綁定
      prevBtn.onclick = (e) => { e.preventDefault(); animateSlideChange(prevPage); };
      nextBtn.onclick = (e) => { e.preventDefault(); animateSlideChange(nextPage); };
      hotLeft.onclick = (e) => { e.preventDefault(); animateSlideChange(prevPage); };
      hotRight.onclick = (e) => { e.preventDefault(); animateSlideChange(nextPage); };

      stopBtn.onclick = (e) => {
        e.preventDefault();
        if (autoSlideInterval) {
          stopAutoPlay();
          stopBtn.innerHTML = '▶️ 播放';
          stopBtn.style.background = '#2b5b3c';
        } else {
          startAutoPlay();
          stopBtn.innerHTML = '⏸️ 停止';
          stopBtn.style.background = '#4a3b3b';
        }
      };

      // 點擊圖片全螢幕
      document.querySelectorAll('.page img').forEach(img => {
        img.addEventListener('click', async (e) => {
          e.stopPropagation();
          if (img.requestFullscreen) await img.requestFullscreen();
          else if (img.webkitRequestFullscreen) img.webkitRequestFullscreen();
        });
      });

      // 觸控滑動 (改善)
      let touchStartX = 0, touchStartY = 0, touchMoved = false;
      slider.addEventListener('touchstart', (e) => {
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
        touchMoved = false;
      }, { passive: true });

      slider.addEventListener('touchmove', (e) => {
        if (!touchStartX) return;
        const dx = e.touches[0].clientX - touchStartX;
        const dy = e.touches[0].clientY - touchStartY;
        if (Math.abs(dx) > 15 && Math.abs(dy) < Math.abs(dx) * 0.7) {
          touchMoved = true;
          e.preventDefault();
        }
      }, { passive: false });

      slider.addEventListener('touchend', (e) => {
        if (!touchStartX || !touchMoved) { touchStartX = 0; return; }
        const dx = e.changedTouches[0].clientX - touchStartX;
        if (Math.abs(dx) > 45) {
          if (dx < 0) animateSlideChange(nextPage);
          else animateSlideChange(prevPage);
        }
        touchStartX = 0; touchMoved = false;
      });

      // 滑鼠拖曳
      let mouseDown = false, startMouseX = 0;
      slider.addEventListener('mousedown', (e) => {
        mouseDown = true;
        startMouseX = e.clientX;
        slider.style.cursor = 'grabbing';
        e.preventDefault();
      });
      window.addEventListener('mouseup', (e) => {
        if (!mouseDown) return;
        const diff = e.clientX - startMouseX;
        if (Math.abs(diff) > 50) {
          if (diff < 0) animateSlideChange(nextPage);
          else animateSlideChange(prevPage);
        }
        mouseDown = false;
        slider.style.cursor = 'grab';
      });
      slider.addEventListener('dragstart', (e) => e.preventDefault());

      // 手動切頁後重置自動播放 (保留狀態)
      const originalAnimate = animateSlideChange;
      animateSlideChange = function(changeFn) {
        originalAnimate(changeFn);
        if (autoSlideInterval) {
          stopAutoPlay();
          startAutoPlay();
        }
      };
      window.animateSlideChange = animateSlideChange;

      // 重新指派點擊事件使用新的animateSlideChange
      prevBtn.onclick = (e) => { e.preventDefault(); window.animateSlideChange(prevPage); };
      nextBtn.onclick = (e) => { e.preventDefault(); window.animateSlideChange(nextPage); };
      hotLeft.onclick = (e) => { e.preventDefault(); window.animateSlideChange(prevPage); };
      hotRight.onclick = (e) => { e.preventDefault(); window.animateSlideChange(nextPage); };

      // 更新dots監聽
      dots.forEach((dot, idx) => {
        dot.removeEventListener('click', dot.handler);
        const handler = () => window.animateSlideChange(() => { currentIndex = idx; updateSlider(); });
        dot.handler = handler;
        dot.addEventListener('click', handler);
      });

      // 確保停止按鈕文字
      stopBtn.innerHTML = autoSlideInterval ? '⏸️ 停止' : '▶️ 播放';
      stopBtn.style.background = autoSlideInterval ? '#4a3b3b' : '#2b5b3c';

      updateSlider();
      window.addEventListener('resize', updateSlider);
    })();
  </script>
</body>
</html>
