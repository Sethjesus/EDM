<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>政府補助</title>
  <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">

  <!-- ✅ 加入可愛字體 -->
  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Baloo+2:wght@600&display=swap" rel="stylesheet">
  
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-image: url('https://github.com/Sethjesus/Photo/blob/main/EDM10.jpg?raw=true');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .container-fluid {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    .pages {
      display: flex;
      width: 900vw; /* 9頁幻燈片 */
      transition: transform 0.8s ease-in-out;
    }

    .page {
      min-width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      background: rgba(0, 0, 0, 0.4);
    }

    .page img {
      width: 60%;
      max-height: 75%;
      object-fit: contain;
      cursor: pointer;
      transition: transform 0.3s ease;
    }

    .page img:hover {
      transform: scale(1.05);
    }

    /* ✅ 可愛字體樣式 */
    .page-text {
      font-family: 'ZCOOL KuaiLe', 'Baloo 2', cursive, 'Microsoft JhengHei', sans-serif;
      font-size: 2.5vw;
      letter-spacing: 2px;
      color: #fff9c4;
      text-align: center;
      margin-bottom: 10px;
      text-shadow: 2px 2px 5px rgba(0,0,0,0.5);
      background-color: rgba(255, 182, 193, 0.15);
      padding: 12px 18px;
      border-radius: 12px;
      border: 2px dashed #ffe57f;
    }

    .controls {
      position: fixed;
      bottom: 15px;
      width: 100%;
      text-align: center;
    }
    
    .controls button, .home-btn {
      padding: 8px 15px;
      font-size: 14px;
      cursor: pointer;
      border: none;
      color: white;
      border-radius: 5px;
      transition: background-color 0.3s, transform 0.2s;
      margin: 5px;
      box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.2);
    }

    .controls button {
      background-color: #007BFF;
    }

    .home-btn {
      background-color: #28a745; /* 綠色按鈕 */
      text-decoration: none;
      display: inline-block;
    }

    .home-btn:hover {
      background-color: #218838;
      transform: scale(1.05);
    }
  </style>
</head>
<body>

  <div class="container-fluid">
    <div class="pages" id="slider">
      <div class="page">
        <div class="page-text">🌸 校園能耗管理 🌸</div>
        <img src="https://github.com/Sethjesus/Photo/blob/main/EDM1.jpg?raw=true" onclick="toggleFullscreen(this)">
      </div>
      <div class="page">
        <div class="page-text">🍃 校園碳盤查 🍃</div>
        <img src="https://github.com/Sethjesus/Photo/blob/main/EDM2.jpg?raw=true" onclick="toggleFullscreen(this)">
      </div>
      <div class="page">
        <div class="page-text">✨ 半導體製造業 ✨</div>
        <img src="https://github.com/Sethjesus/Photo/blob/main/EDM3.jpg?raw=true" onclick="toggleFullscreen(this)">
      </div>
      <div class="page">
        <div class="page-text">💧 淨零低碳化服務 💧</div>
        <img src="https://github.com/Sethjesus/Photo/blob/main/EDM4.jpg?raw=true" onclick="toggleFullscreen(this)">
      </div>
      <div class="page">
        <div class="page-text">☀️ 陽光空氣水方案 ☁️</div>
        <img src="https://github.com/Sethjesus/Photo/blob/main/EDM5.jpg?raw=true" onclick="toggleFullscreen(this)">
      </div>
      <div class="page">
        <div class="page-text">⚡ 智慧能源管理 ISO50001 ⚡</div>
        <img src="https://github.com/Sethjesus/Photo/blob/main/EDM6.jpg?raw=true" onclick="toggleFullscreen(this)">
      </div>
      <div class="page">
        <div class="page-text">🏯 宮廟16+4碳盤查補助 🏯</div>
        <img src="https://github.com/Sethjesus/Photo/blob/main/EDM7.jpg?raw=true" onclick="toggleFullscreen(this)">
      </div>
      <div class="page">
        <div class="page-text">🌿 低碳旅遊 🌿</div>
        <img src="https://github.com/Sethjesus/Photo/blob/main/EDM8.jpg?raw=true" onclick="toggleFullscreen(this)">
      </div>
      <div class="page">
        <div class="page-text">🌏 ISO-14067碳足跡認證 🌏</div>
        <img src="https://github.com/Sethjesus/Photo/blob/main/EDM9.jpg?raw=true" onclick="toggleFullscreen(this)">
      </div>
      <div class="page">
        <div class="page-text">🌏 量販百貨智慧管理方案 🌏</div>
        <img src="https://github.com/Sethjesus/Photo/blob/main/EDM19.jpg?raw=true" onclick="toggleFullscreen(this)">
      </div>
    </div>
  </div>

  <div class="controls">
    <button id="prev">上一頁</button>
    <button id="next">下一頁</button>
    <button id="stop">停止</button>
    <a href="https://jpesg.netlify.app/" class="home-btn">回景煬首頁</a>
  </div>

  <script>
    let currentIndex = 0;
    const slider = document.getElementById('slider');
    const totalPages = document.querySelectorAll('.page').length;
    let autoSlide;

    function updateSlider() {
      slider.style.transform = `translateX(-${currentIndex * 100}vw)`;
    }

    function nextPage() {
      currentIndex = (currentIndex + 1) % totalPages;
      updateSlider();
    }

    function prevPage() {
      currentIndex = (currentIndex - 1 + totalPages) % totalPages;
      updateSlider();
    }

    function startAutoSlide() {
      autoSlide = setInterval(nextPage, 6000);
    }

    function stopAutoSlide() {
      clearInterval(autoSlide);
    }

    document.getElementById('next').addEventListener('click', nextPage);
    document.getElementById('prev').addEventListener('click', prevPage);
    document.getElementById('stop').addEventListener('click', stopAutoSlide);

    startAutoSlide();

    function toggleFullscreen(img) {
      if (!document.fullscreenElement) {
        img.requestFullscreen();
      } else {
        document.exitFullscreen();
      }
    }
  </script>

</body>
</html>
